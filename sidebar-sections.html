<script>
(function () {
  function stripSectionNumber(text) {
    return text.trim().replace(/^\\d+\\.\\d+\\s+/, "");
  }

  function initializeCurrentChapterSidebar() {
    const sidebar = document.querySelector("#quarto-sidebar");
    if (!sidebar) return;

    const list = sidebar.querySelector(".sidebar-menu-container > ul") ||
      sidebar.querySelector("ul.list-unstyled");
    if (!list) return;

    const items = Array.from(list.children).filter(function (item) {
      return item.matches("li.sidebar-item");
    });

    const groups = [];
    const pageLabels = new Map();
    let currentGroup = null;
    let currentSectionLabel = null;

    items.forEach(function (item) {
      const link = item.querySelector(":scope > .sidebar-item-container a.sidebar-link");
      if (!link) {
        currentGroup = null;
        return;
      }

      const chapterNumber = link.querySelector(".chapter-number");
      if (chapterNumber) {
        currentGroup = {
          chapter: item,
          number: chapterNumber.textContent.trim(),
          sections: []
        };
        groups.push(currentGroup);
        item.classList.add("book-chapter-item");
        return;
      }

      const path = new URL(link.href, window.location.href).pathname;
      const isSectionPage = path.split("/").some(function (part) {
        return /^chapter[0-9]+$/.test(part);
      });
      if (currentGroup && isSectionPage) {
        const menuText = link.querySelector(".menu-text") || link;
        const title = stripSectionNumber(menuText.textContent);
        const label = currentGroup.number + "." + (currentGroup.sections.length + 1) + " " + title;

        menuText.textContent = label;
        pageLabels.set(path, label);
        currentGroup.sections.push(item);
        item.classList.add("book-section-item");

        if (link.matches(".active, [aria-current='page']")) {
          currentSectionLabel = label;
        }
      } else {
        currentGroup = null;
      }
    });

    groups.forEach(function (group) {
      const isCurrent =
        !!group.chapter.querySelector("a.sidebar-link.active, a[aria-current='page']") ||
        group.sections.some(function (item) {
          return !!item.querySelector("a.sidebar-link.active, a[aria-current='page']");
        });

      group.chapter.classList.toggle("current-book-chapter", isCurrent);
      const chapterLink = group.chapter.querySelector("a.sidebar-link");
      if (chapterLink) chapterLink.setAttribute("aria-expanded", String(isCurrent));

      group.sections.forEach(function (item) {
        item.hidden = !isCurrent;
      });
    });

    if (currentSectionLabel) {
      const titleBlock = document.querySelector("header#title-block-header");
      if (titleBlock) {
        titleBlock.classList.add("section-title-block");
        titleBlock.style.setProperty("display", "block", "important");
        titleBlock.style.setProperty("width", "100%", "important");
        titleBlock.style.setProperty("text-align", "left", "important");
      }

      const heading =
        (titleBlock && titleBlock.querySelector("h1.title")) ||
        document.querySelector("main.content h1");
      if (heading) {
        heading.textContent = currentSectionLabel;
        heading.style.setProperty("width", "100%", "important");
        heading.style.setProperty("text-align", "left", "important");
      }

      const titleParts = document.title.split("–");
      titleParts[0] = currentSectionLabel + " ";
      document.title = titleParts.join("–");
    }

    document.querySelectorAll("nav.page-navigation a.pagination-link").forEach(function (link) {
      const path = new URL(link.href, window.location.href).pathname;
      const label = pageLabels.get(path);
      const text = link.querySelector(".nav-page-text");
      if (label && text) text.textContent = label;
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initializeCurrentChapterSidebar);
  } else {
    initializeCurrentChapterSidebar();
  }
})();
</script>
